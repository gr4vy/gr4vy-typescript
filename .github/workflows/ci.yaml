name: CI
on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
  workflow_dispatch: {}
  schedule:
    # “At 08:30 on every day-of-week from Monday through Friday.”
    - cron: 30 8 * * 1-5

jobs:
  test:
    runs-on: ubuntu-latest
    
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x
          - 24.x
        # The E2E suite is split into shards that run in parallel. Each test file
        # provisions its own merchant account, so vitest can safely distribute the
        # files across shards. Bump `shard-total` (and this list) to add capacity.
        shard:
          - 1
          - 2
          - 3
          - 4

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@f1f314fca9dfce2769ece7d933488f076716723e # v1
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
         npm i

      - name: Run tests
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          npx vitest run --testTimeout=30000 --hookTimeout=30000 --shard=${{ matrix.shard }}/4

      - uses: hmarr/auto-approve-action@8f929096a962e83ccdfa8afcf855f39f12d4dac7 # v4
        if: ${{ success() && github.event.pull_request.user.login == 'github-actions[bot]' }}
        with:
          github-token: ${{ secrets.DISPATCH_ACCESS_TOKEN }}

  # Reports code coverage and endpoint reach as a sticky PR comment. Runs the
  # full suite once (un-sharded) so a single coverage report is produced. This
  # job is intentionally NOT a dependency of `merge`, so it never blocks the
  # auto-merge of generated SDK PRs.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request_target'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Use Node.js 22.x
        uses: actions/setup-node@f1f314fca9dfce2769ece7d933488f076716723e # v1
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm i

      - name: Run tests with coverage
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: npx vitest run --coverage --testTimeout=30000 --hookTimeout=30000

      - name: Build endpoint coverage report
        run: node scripts/endpoint-coverage.mjs

      - name: Comment coverage on the PR
        uses: marocchino/sticky-pull-request-comment@d2ad0de260ae8b0235ce059e63f2949ba9e05943 # v2.9.3
        with:
          header: test-coverage
          path: coverage/endpoint-coverage.md

  merge:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - id: automerge
        name: automerge
        if: "github.event.pull_request.user.login == 'github-actions[bot]'"
        uses: "pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67" # v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.DISPATCH_ACCESS_TOKEN }}
          MERGE_LABELS: ''
          MERGE_REQUIRED_APPROVALS: 0
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: "pull-request-title"
          MERGE_ERROR_FAIL: true
          MERGE_DELETE_BRANCH: true
          MERGE_FORKS: false
          UPDATE_METHOD: rebase

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ contains(needs.*.result, 'failure') }}
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'github-actions[bot]')
        env:
            SLACK_USERNAME: TypeScript SDK 
            SLACK_TITLE: TypeScript SDK
            SLACK_WEBHOOK: ${{ secrets.SLACK_SDK_WEBHOOK_URL }}
            SLACK_CHANNEL: sdk-updates
            SLACK_MSG_AUTHOR: gr4vy-code
            SLACK_ICON_EMOJI: ":gr4vy:"
            SLACK_COLOR: "failure"
            SLACK_MESSAGE_ON_FAILURE: "CI failed"
            SLACK_FOOTER: ""
